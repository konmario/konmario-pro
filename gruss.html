<!DOCTYPE html>
<!--
  Die Teilchen von Konmario-pro — gefunden, wer suchet. ✳

  Diese Datei ist ein Geschenk. Sie braucht kein Internet, keinen Server,
  keine Installation. Nur einen Doppelklick — heute, nächstes Jahr, immer.

  ~2200 Lichtteilchen, jedes mit eigener Physik. Keine Videos, keine Bilder,
  kein Trick: alles wird in diesem Moment berechnet, während du zusiehst.
  Beweg die Maus durch die Teilchen. Klick. Warte. Lies.
-->
<html lang="de">
<head>
<meta charset="utf-8">
<title>✳ — Konmario-pro</title>
<style>
  html, body { margin: 0; height: 100%; background: #0d0d18; overflow: hidden; }
  /* position:fixed + 100% zwingt die Zeichenfläche IMMER auf exakt
     Fenstergröße — egal was der Browser über seine Größe behauptet. */
  canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  #hint {
    position: fixed; bottom: 18px; width: 100%; text-align: center;
    font-family: -apple-system, "Helvetica Neue", sans-serif; font-size: 13px;
    color: rgba(160, 160, 200, .55); letter-spacing: .5px;
    animation: fade 4s ease-in-out infinite alternate; pointer-events: none;
  }
  @keyframes fade { from { opacity: .35; } to { opacity: .9; } }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Beweg die Maus durch das Licht &nbsp;·&nbsp; klick &nbsp;·&nbsp; und warte einfach</div>
<script>
"use strict";

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let W, H;

// Die Botschaft — Zeile für Zeile, aus Licht gebaut
const PHRASES = [
  "Hallo Welt",
  "Das hier ist Konmario-pro.",
  "Eine Woche.",
  "Ein Mensch + eine KI.",
  "Ein MacBook von 2012.",
  "Alles läuft lokal.",
  "Bleib neugierig.",
  "Bau weiter.",
  "✳"
];
const HOLD_MS = 4200;    // so lange bleibt ein FERTIGES Wort stehen
const MAX_WAIT = 12000;  // Notbremse, falls es sich mal nicht sammelt
const N = 2200;          // Anzahl Lichtteilchen

let particles = [];
let targets = [];
let phraseIdx = 0;
let mouse = { x: -9999, y: -9999 };

// Zustand für den Wortwechsel: erst sammeln, dann lesbar stehen lassen
let converged = false;
let holdUntil = 0;
let phraseStart = performance.now();

// Fertige Farbtöne (einmal berechnen ist viel schneller als jedes Mal neu)
const PALETTE = [];
for (let k = 0; k < 24; k++) {
  PALETTE.push(`hsl(${320 - k * 6}, 90%, 65%)`);  // Pink → Violett → Türkis
}

function resize() {
  // Wir fragen nicht das Fenster nach seiner Größe (das lügt manchmal),
  // sondern messen, wie groß die Zeichenfläche WIRKLICH dargestellt wird.
  const rect = canvas.getBoundingClientRect();
  W = Math.round(rect.width);
  H = Math.round(rect.height);
  canvas.width = W;
  canvas.height = H;
  setTargets(PHRASES[phraseIdx]);
}

// Schreibt den Text unsichtbar auf eine zweite Leinwand und liest aus,
// WELCHE Pixel er füllt — diese Punkte werden die Ziele der Teilchen.
function textPoints(text) {
  const off = document.createElement("canvas");
  const octx = off.getContext("2d");
  off.width = 1200; off.height = 360;
  octx.fillStyle = "#fff";
  let size = 150;
  octx.font = `900 ${size}px -apple-system, "Helvetica Neue", sans-serif`;
  while (octx.measureText(text).width > off.width - 60 && size > 30) {
    size -= 6;
    octx.font = `900 ${size}px -apple-system, "Helvetica Neue", sans-serif`;
  }
  octx.textAlign = "center";
  octx.textBaseline = "middle";
  octx.fillText(text, off.width / 2, off.height / 2);

  const data = octx.getImageData(0, 0, off.width, off.height).data;
  const pts = [];
  const step = 3;
  for (let y = 0; y < off.height; y += step) {
    for (let x = 0; x < off.width; x += step) {
      if (data[(y * off.width + x) * 4 + 3] > 128) pts.push([x, y]);
    }
  }
  // WICHTIG: Nie mehr Zielpunkte als Teilchen! Die Punkte entstehen
  // zeilenweise von oben nach unten — hätte der Text mehr Punkte als wir
  // Teilchen haben, bliebe sein unterer Teil einfach leer. (Genau das
  // war der berühmte "abgeschnittene Text"-Bug dieser Datei.)
  // Deshalb: mischen und nur so viele behalten, wie Teilchen da sind.
  if (pts.length > N) {
    for (let i = pts.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [pts[i], pts[j]] = [pts[j], pts[i]];
    }
    pts.length = N;
  }

  // Punkte auf die echte Fenstergröße umrechnen (mittig, 86% Breite)
  const scale = Math.min((W * 0.86) / off.width, (H * 0.55) / off.height);
  return pts.map(([x, y]) => [
    W / 2 + (x - off.width / 2) * scale,
    H / 2 + (y - off.height / 2) * scale
  ]);
}

function setTargets(text) {
  targets = textPoints(text);
}

function makeParticles() {
  particles = [];
  for (let i = 0; i < N; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: 0, vy: 0,
      jitter: 0.15 + Math.random() * 0.35   // jedes Teilchen zappelt anders
    });
  }
}

function nextPhrase() {
  phraseIdx = (phraseIdx + 1) % PHRASES.length;
  setTargets(PHRASES[phraseIdx]);
  converged = false;
  phraseStart = performance.now();
}

function tick() {
  // Halbtransparent übermalen statt löschen → die Teilchen ziehen Schweife
  ctx.fillStyle = "rgba(13, 13, 24, 0.4)";
  ctx.fillRect(0, 0, W, H);

  const M = targets.length;
  let distSum = 0, distCount = 0;

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const t = targets[i % M];

    // Feder-Physik: sanft zum Ziel gezogen, mit Dämpfung
    p.vx += (t[0] - p.x) * 0.03;
    p.vy += (t[1] - p.y) * 0.03;

    // Die Maus schiebt Teilchen weg — wie ein Finger im Wasser
    const dx = p.x - mouse.x, dy = p.y - mouse.y;
    const d2 = dx * dx + dy * dy;
    if (d2 < 10000) {
      const f = (1 - d2 / 10000) * 9;
      const d = Math.sqrt(d2) || 1;
      p.vx += (dx / d) * f;
      p.vy += (dy / d) * f;
    }

    // Ein Hauch Unruhe, damit das Licht lebendig flirrt —
    // aber sobald das Wort steht, werden die Teilchen ruhig (lesbar!)
    const calm = converged ? 0.12 : 1;
    p.vx += (Math.random() - 0.5) * p.jitter * calm;
    p.vy += (Math.random() - 0.5) * p.jitter * calm;

    p.vx *= 0.84; p.vy *= 0.84;
    p.x += p.vx; p.y += p.vy;

    // Jedes 7. Teilchen fragen wir: Bist du schon an deinem Platz?
    if (i % 7 === 0) {
      distSum += Math.abs(t[0] - p.x) + Math.abs(t[1] - p.y);
      distCount++;
    }

    // Farbe: von Pink über Violett nach Türkis, je nach Position
    const ci = Math.max(0, Math.min(23, (p.x / W * 24) | 0));
    ctx.fillStyle = PALETTE[ci];
    ctx.fillRect(p.x, p.y, 1.5, 1.5);
  }

  // Wortwechsel-Logik: Erst wenn das Wort WIRKLICH dasteht, startet die
  // Lese-Uhr — egal wie schnell oder langsam der Computer ist.
  const now = performance.now();
  const avgDist = distSum / (distCount || 1);
  if (!converged && (avgDist < 10 || now - phraseStart > MAX_WAIT)) {
    converged = true;
    holdUntil = now + HOLD_MS;
  }
  if (converged && now > holdUntil) {
    nextPhrase();
  }

  requestAnimationFrame(tick);
}

// Maus & Finger
window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener("mouseout", () => { mouse.x = -9999; mouse.y = -9999; });
window.addEventListener("touchmove", e => {
  mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
}, { passive: true });

// Klick: alles explodiert kurz — und findet von selbst wieder zusammen.
// (Falls du eine Metapher suchst: genau so funktioniert Lernen.)
window.addEventListener("mousedown", () => {
  for (const p of particles) {
    const a = Math.random() * Math.PI * 2;
    const s = 14 + Math.random() * 26;
    p.vx += Math.cos(a) * s;
    p.vy += Math.sin(a) * s;
  }
});

window.addEventListener("resize", resize);

// Sicherheitsnetz: Manche Fenster (z.B. Vorschau-Panels) melden Größen-
// änderungen nicht zuverlässig — deshalb prüfen wir alle 2 Sekunden selbst.
setInterval(() => {
  const rect = canvas.getBoundingClientRect();
  if (Math.round(rect.width) !== W || Math.round(rect.height) !== H) resize();
}, 2000);

resize();
makeParticles();
tick();
</script>
</body>
</html>
